  /public_api/v1/configurations/agent/auto_upgrade:
    description: |
      Retrieve or update the agent upgrade scheduler and number of parallel upgrades allowed for the tenant. 
      During the first week of a new agent release rollout, only a single batch of agents is upgraded. After that, auto-upgrades continue to be deployed across your network with the number of parallel upgrades as configured.
