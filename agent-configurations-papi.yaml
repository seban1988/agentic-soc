openapi: 3.0.3
info:
  title: Agent Configuration Settings API
  description: |
    Manage global agent configuration settings for your Cortex XSIAM environment.
    These endpoints allow you to retrieve and update settings that control agent
    behavior across content management, auto-upgrades, status timeouts, analysis
    options, and administrative cleanup.

    **Required license:** Cortex XSIAM Premium or Cortex XSIAM Enterprise or Cortex XSIAM NG SIEM.
  version: 1.0.0
  contact:
    email: docs-cortex@redacted.example.com
    name: Cortex Documentation Team
    url: 'https://docs-cortex.redacted.example.com/'
servers:
  - url: 'https://api-yourfqdn'
tags:
  - name: Agent Configurations
    x-displayName: Agent Configurations
    description: |
      Endpoints for retrieving and updating global agent configuration settings. 
      Each configuration category includes dedicated endpoints for retrieving the current configuration and updating the associated settings.
security:
  - api-key-header-x-xdr-auth-id: []
    api-key-header-authorization: []
paths:
  /public_api/v1/configurations/agent/content_management:
    description: |
      Retrieve or update the content management configuration for the tenant, including
      bandwidth control and minor content version update settings.
    post:
      tags:
        - Agent Configurations
      summary: Retrieve content management settings
      description: 'Returns the current content management settings configured for agents in your organization, including bandwidth control allocation and minor content version update settings. Use this endpoint to view the bandwidth limits configured for content distribution and determine whether minor content updates are enabled for enhanced threat protection.'
      operationId: getContentManagement
      responses:
        '200':
          description: Successful response containing the current content management configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentManagementResponse'
              example:
                reply:
                  enable_bandwidth_control: true
                  bandwidth_in_mbps: 100
                  enable_minor_content_version_updates: true
        '400':
          description: Bad request. The request was malformed or contained invalid parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                badrequest:
                  $ref: '#/components/examples/BadRequestError'
        '401':
          description: Unauthorized. Authentication credentials are missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  $ref: '#/components/examples/UnauthorizedError'
        '403':
          description: Forbidden. The API key does not have the required permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbidden:
                  $ref: '#/components/examples/ForbiddenError'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                InternalServerError:
                  $ref: '#/components/examples/InternalServerError'
  /public_api/v1/configurations/agent/content_management/set:
    description: |
      Updates the content management configuration for the tenant.
    post:
      tags:
        - Agent Configurations
      summary: Update content management settings
      description: 'Updates the content management settings for agents in your organization, including bandwidth control allocation and  minor content version update settings.  Configure the maximum bandwidth allocated for content distribution between 20 and 10000 Mbps to control agent network consumption.  You can also enable or disable minor content version updates to control how frequently agents receive incremental threat protection  updates between major content releases.'
      operationId: setContentManagement
      requestBody:
        required: true
        description: Content management configuration settings to update.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetContentManagementRequest'
      responses:
        '200':
          description: Successful response indicating the configuration was updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
              example:
                reply: true
        '400':
          description: Bad request. The request was malformed or contained invalid parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                badrequest:
                  $ref: '#/components/examples/BadRequestError'
        '401':
          description: Unauthorized. Authentication credentials are missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  $ref: '#/components/examples/UnauthorizedError'
        '403':
          description: Forbidden. The API key does not have the required permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbidden:
