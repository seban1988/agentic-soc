components:
  securitySchemes:
    api-key-header-x-xdr-auth-id:
      type: apiKey
      name: x-xdr-auth-id
      in: header
      description: The API key ID.
    api-key-header-authorization:
      type: apiKey
      name: Authorization
      in: header
      description: The API key.
  examples:
    BadRequestError:
      value:
        reply:
          err_code: 400
          err_msg: Bad request. Got an invalid JSON.
          err_extra: Additional error context
    UnauthorizedError:
      value:
        reply:
          err_code: 401
          err_msg: Public API request unauthorized
          err_extra: Additional error context
    ForbiddenError:
      value:
        reply:
          err_code: 403
          err_msg: Forbidden. Access was denied to this resource.
          err_extra: Insufficient permissions for api key
    InternalServerError:
      value:
        reply:
          err_code: 500
          err_msg: Internal server error
          err_extra: Additional error context
  schemas:
    ErrorResponse:
      type: object
      description: Standard error response returned when a request fails.
      properties:
        reply:
          type: object
          description: Error details container.
          properties:
            err_code:
              type: integer
              description: Numeric error code identifying the type of error.
            err_msg:
              type: string
              description: Human-readable error message describing what went wrong.
            err_extra:
              type: string
              description: 'Additional context about the error, if available.'
    BaseResponse:
      type: object
      description: Standard success response for configuration update operations.
      properties:
        reply:
          type: boolean
          description: Indicates whether the operation completed successfully.
          example: true
    ContentManagementResponse:
      type: object
      description: Current content management configuration settings.
      properties:
        reply:
          type: object
          properties:
            enable_bandwidth_control:
              type: boolean
              description: Indicates whether bandwidth control is currently enabled for agent network consumption during content updates and package downloads.
              example: true
            bandwidth_in_mbps:
              type: integer
              description: The current maximum bandwidth in Mbps allocated for content downloads.
              example: 100
            enable_minor_content_version_updates:
              type: boolean
              description: Indicates whether automatic minor content updates between major content releases are enabled.
              example: true
    SetContentManagementRequest:
      type: object
      description: Request payload for updating agent content management settings.
      properties:
        request_data:
          type: object
          required:
            - enable_bandwidth_control
            - bandwidth_in_mbps
          properties:
            enable_bandwidth_control:
              type: boolean
              description: Enables bandwidth control for the agent network consumption during content updates and package downloads.
              example: true
            bandwidth_in_mbps:
              type: integer
              minimum: 20
              maximum: 10000
              description: Defines the maximum bandwidth allocated for agent content downloads in megabits per second (Mbps). Must be between 20 and 10000 Mbps.
              example: 100
            enable_minor_content_version_updates:
              type: boolean
              default: true
              description: 'Enables delivery of minor content updates between major content releases. When `true`, the agents receive more frequent content updates to improve their ability to protect against emerging threats. When `false`, agents receive updates only during major content releases.'
              example: true
    AgentStatusResponse:
      type: object
      description: Current agent status timeout configuration.
      properties:
        reply:
          type: object
          properties:
            license_revocation_after_lost_connection:
              type: integer
              description: Indicates the current number of days after which the license is revoked when an agent loses connection to Cortex.
              example: 30
            agent_deletion_retention:
              type: integer
              description: Indicates the number of days to retain agent data before deletion from the Cortex database after loss of connection.
              example: 90
    SetAgentStatusRequest:
      type: object
      description: Request payload for updating agent status timeout configuration.
      properties:
        request_data:
          type: object
          required:
            - license_revocation_after_lost_connection
            - agent_deletion_retention
          properties:
            license_revocation_after_lost_connection:
              type: integer
              minimum: 2
              maximum: 60
              description: Number of days after which the license is revoked when an agent loses connection to Cortex. Day one is counted as the first 24 hours with no connection.
              default: 30
              example: 30
            agent_deletion_retention:
              type: integer
              minimum: 3
              maximum: 360
              description: Number of days to retain agent data before deletion from the Cortex database after loss of connection. Ensure that this value is greater than the `license_revocation_after_lost_connection` period. Day one is counted as the first 24 hours with no connection.
              default: 180
              example: 90
    AgentAutoUpgradeResponse:
      type: object
      description: Current agent auto-upgrade configuration.
      properties:
        reply:
          type: object
          properties:
            amount_of_parallel_upgrades:
              type: integer
              description: The current maximum number of agents that can be upgraded simultaneously.
              example: 10
    SetAgentAutoUpgradeRequest:
      type: object
      description: Request payload for updating agent auto-upgrade configuration.
      properties:
        request_data:
          type: object
          required:
            - amount_of_parallel_upgrades
          properties:
            amount_of_parallel_upgrades:
              type: integer
              minimum: 1
              maximum: 2000
              description: Specify the desired maximum number of agents to upgrade simultaneously.
              example: 10
    WildfireAnalysisResponse:
      type: object
      description: Current WildFire analysis configuration.
      properties:
        reply:
          type: object
          properties:
            enable_wildfire_analysis_scoring_for_benign_verdicts:
              type: boolean
              description: Indicates whether WildFire analysis scoring is currently applied to files that received a benign verdict.
              example: false
    SetWildfireAnalysisRequest:
      type: object
      description: Request payload for updating WildFire analysis configuration.
      properties:
        request_data:
          type: object
          required:
            - enable_wildfire_analysis_scoring_for_benign_verdicts
          properties:
            enable_wildfire_analysis_scoring_for_benign_verdicts:
              type: boolean
              description: Set to `true` to enable WildFire analysis scoring for files that received a benign verdict.
              example: false
    InformativeBTPIssuesResponse:
      type: object
      description: Current informative BTP issues display configuration.
      properties:
        reply:
          type: object
          properties:
            display_unique_and_informative_btp_rules:
              type: boolean
              description: Indicates whether unique and informative Behavioral Threat Protection (BTP) rules are currently displayed in the console.
              example: true
    SetInformativeBTPIssuesRequest:
      type: object
      description: Request payload for updating informative BTP issues display configuration.
      properties:
        request_data:
          type: object
          required:
            - display_unique_and_informative_btp_rules
          properties:
            display_unique_and_informative_btp_rules:
              type: boolean
              description: Set to `true` to display unique and informative Behavioral Threat Protection (BTP) rules in the console.
              example: true
    LogCollectionResponse:
      type: object
      description: Current Cortex XDR log collection configuration.
      properties:
        reply:
          type: object
          properties:
            allow_logs_collection:
              type: boolean
              description: Indicates whether agents are currently allowed to collect and send diagnostic logs.
              example: true
    SetLogCollectionRequest:
      type: object
      description: Request payload for updating Cortex XDR log collection configuration.
      properties:
        request_data:
          type: object
          required:
            - allow_logs_collection
          properties:
            allow_logs_collection:
              type: boolean
              description: Set to `true` to allow agents to collect and send diagnostic logs.
              example: true
    ActionCenterExpirationResponse:
      type: object
      description: Current action center expiration settings. Keys represent action types and values represent the current expiration durations in hours.
      properties:
        reply:
          type: object
          additionalProperties:
            type: integer
            description: The current expiration duration in hours for the specified action type.
            example: 72
          example:
            abort_scan: 4
            agent_admin_token: 4
            agent_database_cleanup: 4
            agent_uninstall: 30
            agent_upgrade: 7
            delete_quarantine: 4
            destroy_files: 4
            files_retrieval: 30
            file_prevalence: 4
            host_firewall_activity_report: 4
            isolate: 30
            live_terminal: 4
            memory_collection: 4
            move_server: 30
            pause_endpoint_protection: 4
            process_kill: 4
            quarantine: 4
            registry_search: 4
            remediation: 4
            restart_agent: 4
            restore_quarantine: 4
            resume_endpoint_protection: 4
            retrieve_endpoint_data: 4
            retrieve_security_event_data: 4
            scan: 4
            scouter_agent_uninstall: 30
            scouter_agent_upgrade: 7
            scouter_retrieve_endpoint_data: 4
            script_execution: 4
            terminate_causality: 4
            unblock_ip: 4
            unisolate: 30
    SetActionCenterExpirationRequest:
      type: object
      description: Request payload for updating action center expiration settings. Specify action types as keys and desired expiration durations in hours as values.
      properties:
        request_data:
          type: object
          additionalProperties:
            type: integer
            description: Specify the desired expiration duration in hours for the action type.
            example: 72
          example:
            isolate: 72
            scan: 24
    CriticalEnvironmentVersionsResponse:
      type: object
      description: Current critical environment versions configuration.
      properties:
        reply:
          type: object
          properties:
            enabled_critical_environment_versions:
              type: boolean
              description: Indicates whether version enforcement is currently enabled for agents in critical environments.
              example: true
    SetCriticalEnvironmentVersionsRequest:
      type: object
      description: Request payload for updating critical environment versions configuration.
      properties:
        request_data:
          type: object
          required:
            - enabled_critical_environment_versions
          properties:
            enabled_critical_environment_versions:
              type: boolean
              description: Set to `true` to enable version enforcement for agents in critical environments.
              example: true
    AdvancedAnalysisResponse:
      type: object
      description: Current advanced analysis configuration.
      properties:
        reply:
          type: object
          properties:
            automatically_upload_defined_issue_data_files:
              type: boolean
              description: Indicates whether defined issue data files are currently uploaded automatically for analysis.
              example: true
            automatically_apply_advanced_analysis_exceptions:
              type: boolean
              description: Indicates whether advanced analysis exceptions are currently applied automatically.
              example: false
    SetAdvancedAnalysisRequest:
      type: object
      description: Request payload for updating advanced analysis configuration.
      properties:
        request_data:
          type: object
          required:
            - automatically_upload_defined_issue_data_files
            - automatically_apply_advanced_analysis_exceptions
          properties:
            automatically_upload_defined_issue_data_files:
              type: boolean
              description: Set to `true` to automatically upload defined issue data files for analysis.
              example: true
            automatically_apply_advanced_analysis_exceptions:
              type: boolean
              description: Set to `true` to automatically apply advanced analysis exceptions.
              example: false
    EndpointAdministrationCleanupResponse:
      type: object
      description: Current endpoint administration cleanup configuration.
      properties:
        reply:
          type: object
          properties:
            periodic_duplicate_cleanup:
              type: boolean
              description: Indicates whether periodic cleanup of duplicate endpoints is currently enabled.
              example: true
            host_name:
              type: boolean
              nullable: true
              description: Indicates whether hostname is currently used as a criterion for identifying duplicate endpoints. Null when periodic cleanup is disabled.
              example: true
            ip:
              type: boolean
              nullable: true
              description: Indicates whether IP address is currently used as a criterion for identifying duplicate endpoints. Null when periodic cleanup is disabled.
              example: true
            mac:
              type: boolean
              nullable: true
              description: Indicates whether MAC address is currently used as a criterion for identifying duplicate endpoints. Null when periodic cleanup is disabled.
              example: false
            time_interval_hours:
              type: integer
              enum:
                - 1
                - 6
                - 24
                - 168
              nullable: true
              description: |
                The current time interval in hours between cleanup runs. Null when periodic cleanup is disabled.
                Valid values: `1` (hourly), `6` (every 6 hours), `24` (daily), `168` (weekly).
              example: 24
    SetEndpointAdministrationCleanupRequest:
      type: object
      description: Request payload for updating endpoint administration cleanup configuration.
      properties:
        request_data:
          type: object
          required:
            - periodic_duplicate_cleanup
          properties:
            periodic_duplicate_cleanup:
              type: boolean
              description: Set to `true` to enable periodic cleanup of duplicate endpoints.
              example: true
            host_name:
              type: boolean
              nullable: true
              description: Set to `true` to use hostname as a criterion for identifying duplicate endpoints. Set to null to ignore this criterion.
              example: true
            ip:
              type: boolean
              nullable: true
              description: Set to `true` to use IP address as a criterion for identifying duplicate endpoints. Set to null to ignore this criterion.
              example: true
            mac:
              type: boolean
              nullable: true
              description: Set to `true` to use MAC address as a criterion for identifying duplicate endpoints. Set to null to ignore this criterion.
              example: false
            time_interval_hours:
              type: integer
