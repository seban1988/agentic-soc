      tags:
        - Agent Configurations
      summary: Retrieve agent auto-upgrade settings
      description: 'Returns the current agent auto upgrade configuration for the tenant, including the number of parallel upgrades allowed. During the first week of a new agent release rollout, only a single batch of agents is upgraded. After that, auto-upgrades continue to be deployed across your network with the number of parallel upgrades as configured.'
      operationId: getAgentAutoUpgrade
      responses:
        '200':
          description: Successful response containing the current auto-upgrade configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentAutoUpgradeResponse'
              example:
                reply:
                  amount_of_parallel_upgrades: 10
        '400':
          description: Bad request. The request was malformed or contained invalid parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                badrequest:
