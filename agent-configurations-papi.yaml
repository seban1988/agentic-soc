  /public_api/v1/configurations/agent/informative_btp_issues:
    description: |
      Retrieve or update the informative BTP issues configuration for the tenant, controlling
      display of unique Behavioral Threat Protection rules.
    post:
      tags:
        - Agent Configurations
      summary: Retrieve informative BTP issues settings
      description: |
        Returns the current configuration for displaying informative Behavioral Threat Protection (BTP) alert names and descriptions.

        When enabled, BTP alerts are shown with unique, descriptive names and descriptions that provide immediate clarity into the detected behavior without requiring drill-down into each alert. This setting only affects new alerts, existing alerts are not retroactively updated.
      operationId: getInformativeBTPIssues
      responses:
        '200':
          description: Successful response containing the current BTP issues configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InformativeBTPIssuesResponse'
              example:
                reply:
                  display_unique_and_informative_btp_rules: true
        '400':
          description: Bad request. The request was malformed or contained invalid parameters.
