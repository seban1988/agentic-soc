  /public_api/v1/configurations/agent/wildfire_analysis:
    description: |
      Retrieve or update the WildFire analysis scoring for files with Benign verdicts. 
      Disabling this capability takes immediate effect on new hashes, fresh agent installations, and existing security policies. 
      It could take up to a week to take effect on existing agents in your environment pending agent caching.
    post:
      tags:
        - Agent Configurations
      summary: Retrieve WildFire analysis settings
      description: |
        Returns the current WildFire analysis configuration for the tenant, including whether analysis scoring is enabled for files that received a Benign verdict.

        The WildFire analysis score for Benign-verdict files indicates WildFire's confidence level in that verdict. For example, files signed by a trusted signer receive a high-confidence Benign score, while files that showed no suspicious behavior at test time receive a lower-confidence score. When this setting is enabled, Cortex applies additional verification to Benign Low Confidence files using the active Malware Security profile settings.
      operationId: getWildfireAnalysis
      responses:
        '200':
          description: Successful response containing the current WildFire analysis configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WildfireAnalysisResponse'
              example:
                reply:
                  enable_wildfire_analysis_scoring_for_benign_verdicts: false
        '400':
          description: Bad request. The request was malformed or contained invalid parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                badrequest:
                  $ref: '#/components/examples/BadRequestError'
        '401':
          description: Unauthorized. Authentication credentials are missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  $ref: '#/components/examples/UnauthorizedError'
        '403':
          description: Forbidden. The API key does not have the required permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbidden:
                  $ref: '#/components/examples/ForbiddenError'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                InternalServerError:
                  $ref: '#/components/examples/InternalServerError'
  /public_api/v1/configurations/agent/wildfire_analysis/set:
    description: |
      Updates the WildFire analysis configuration for the tenant.
    post:
      tags:
        - Agent Configurations
      summary: Update WildFire analysis settings
      description: |
        Updates the WildFire analysis configuration for the tenant. When enabled, Cortex applies additional verification to files that received a Benign Low Confidence verdict from WildFire, enforcing the active Malware Security profile settings (local analysis, Allow, or Block).

        **Note:** Disabling this setting takes immediate effect on new file hashes, fresh agent installations, and existing security policies. However, it may take up to one week to take effect on existing agents due to agent-side caching.
      operationId: setWildfireAnalysis
      requestBody:
        required: true
        description: WildFire analysis configuration settings to update.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetWildfireAnalysisRequest'
      responses:
